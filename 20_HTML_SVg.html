<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Images</title>
</head>
<body>
    <h1 style="text-align: center;"><i>Solar System</i></h1>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1000">

<defs>

<!-- Space Background -->
<linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="50%" stop-color="#090b2a"/>
<stop offset="100%" stop-color="#1e1b4b"/>
</linearGradient>

<!-- Sun Glow -->
<radialGradient id="sun">
<stop offset="0%" stop-color="#fff7ae"/>
<stop offset="50%" stop-color="#fbbf24"/>
<stop offset="100%" stop-color="#f97316"/>
</radialGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="18"/>
</filter>

</defs>


<!-- BACKGROUND -->
<rect width="2000" height="1000" fill="url(#space)"/>



<!-- NEBULA -->
<circle cx="300" cy="300"
r="220"
fill="#8b5cf6"
opacity="0.18"
filter="url(#glow)">

<animate attributeName="opacity"
values="0.1;0.3;0.1"
dur="8s"
repeatCount="indefinite"/>

</circle>


<circle cx="1600" cy="650"
r="250"
fill="#06b6d4"
opacity="0.15"
filter="url(#glow)"/>



<!-- MANY STARS -->

<g fill="white">

<circle cx="80" cy="100" r="3"/>
<circle cx="180" cy="300" r="4"/>
<circle cx="260" cy="700" r="3"/>
<circle cx="350" cy="150" r="2"/>
<circle cx="450" cy="500" r="4"/>
<circle cx="520" cy="80" r="3"/>
<circle cx="650" cy="250" r="4"/>
<circle cx="720" cy="820" r="3"/>
<circle cx="820" cy="120" r="3"/>
<circle cx="920" cy="650" r="4"/>
<circle cx="1040" cy="200" r="3"/>
<circle cx="1150" cy="750" r="4"/>
<circle cx="1250" cy="350" r="3"/>
<circle cx="1400" cy="150" r="4"/>
<circle cx="1500" cy="500" r="3"/>
<circle cx="1650" cy="250" r="4"/>
<circle cx="1750" cy="800" r="3"/>
<circle cx="1900" cy="420" r="4"/>


<g>
<animate attributeName="opacity"
values="0.2;1;0.2"
dur="2s"
repeatCount="indefinite"/>

<circle cx="300" cy="850" r="5"/>
<circle cx="600" cy="600" r="4"/>
<circle cx="900" cy="300" r="5"/>
<circle cx="1300" cy="850" r="4"/>
<circle cx="1700" cy="100" r="5"/>

</g>

</g>




<!-- SUN -->

<g>

<circle cx="1000"
cy="500"
r="120"
fill="#fbbf24"
opacity="0.3"
filter="url(#glow)"/>


<circle cx="1000"
cy="500"
r="90"
fill="url(#sun)">

<animate attributeName="r"
values="90;100;90"
dur="5s"
repeatCount="indefinite"/>

</circle>

</g>




<!-- ORBIT LINES -->

<g fill="none"
stroke="#94a3b8"
opacity="0.25">

<ellipse cx="1000" cy="500" rx="220" ry="80"/>
<ellipse cx="1000" cy="500" rx="380" ry="140"/>
<ellipse cx="1000" cy="500" rx="560" ry="200"/>
<ellipse cx="1000" cy="500" rx="760" ry="280"/>
<ellipse cx="1000" cy="500" rx="950" ry="350"/>

</g>





<!-- MERCURY -->

<g>

<circle cx="1220"
cy="500"
r="18"
fill="#9ca3af">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="8s"
repeatCount="indefinite"/>

</circle>

</g>




<!-- VENUS -->

<g>

<circle cx="1380"
cy="500"
r="30"
fill="#f59e0b">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="14s"
repeatCount="indefinite"/>

</circle>

</g>





<!-- EARTH -->

<g>

<circle cx="1560"
cy="500"
r="42"
fill="#2563eb">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="22s"
repeatCount="indefinite"/>

</circle>


<!-- Moon -->

<circle cx="1610"
cy="500"
r="12"
fill="#d1d5db">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1560 500;360 1560 500"
dur="5s"
repeatCount="indefinite"/>

</circle>

</g>





<!-- MARS -->

<circle cx="1760"
cy="500"
r="35"
fill="#ef4444">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="30s"
repeatCount="indefinite"/>

</circle>





<!-- JUPITER -->

<circle cx="1000"
cy="150"
r="85"
fill="#d6b48c">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="50s"
repeatCount="indefinite"/>

</circle>





<!-- SATURN -->

<g>

<circle cx="1000"
cy="850"
r="70"
fill="#fde68a"/>


<ellipse cx="1000"
cy="850"
rx="130"
ry="30"
fill="none"
stroke="#facc15"
stroke-width="15"/>


<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="70s"
repeatCount="indefinite"/>

</g>





<!-- URANUS -->

<circle cx="420"
cy="500"
r="55"
fill="#67e8f9">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="90s"
repeatCount="indefinite"/>

</circle>





<!-- NEPTUNE -->

<circle cx="220"
cy="500"
r="50"
fill="#1d4ed8">

<animateTransform
attributeName="transform"
type="rotate"
values="0 1000 500;360 1000 500"
dur="110s"
repeatCount="indefinite"/>

</circle>






<!-- COMET -->

<g>

<circle cx="400"
cy="200"
r="12"
fill="#fff">

<animateMotion
dur="8s"
repeatCount="indefinite"
path="M0 0 Q500 300 1200 600"/>

</circle>


<path d="M390 200 L250 150"
stroke="white"
stroke-width="5"
opacity="0.7"/>

</g>





<!-- FLOATING PARTICLES -->

<g fill="#38bdf8">

<circle cx="600" cy="350" r="6">
<animate attributeName="cy"
values="350;250;350"
dur="5s"
repeatCount="indefinite"/>
</circle>


<circle cx="1450" cy="700" r="5">
<animate attributeName="cy"
values="700;600;700"
dur="4s"
repeatCount="indefinite"/>
</circle>

</g>



</svg>

<br><br>
<h1 style="text-align: center;"><i>Rocket going from Earth to Mars</iA></h1>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900">

<defs>

<!-- Space Gradient -->
<linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="45%" stop-color="#312e81"/>
<stop offset="100%" stop-color="#581c87"/>
</linearGradient>


<!-- Earth -->
<radialGradient id="earth">
<stop offset="0%" stop-color="#38bdf8"/>
<stop offset="70%" stop-color="#2563eb"/>
<stop offset="100%" stop-color="#082f49"/>
</radialGradient>


<!-- Mars -->
<radialGradient id="mars">
<stop offset="0%" stop-color="#fb923c"/>
<stop offset="70%" stop-color="#dc2626"/>
<stop offset="100%" stop-color="#450a0a"/>
</radialGradient>


<!-- Glow -->
<filter id="glow">
<feGaussianBlur stdDeviation="15"/>
</filter>

</defs>



<!-- SPACE -->

<rect width="1800"
height="900"
fill="url(#space)"/>




<!-- NEBULA -->

<circle cx="500"
cy="300"
r="260"
fill="#ec4899"
opacity="0.18"
filter="url(#glow)">

<animate attributeName="opacity"
values="0.15;0.35;0.15"
dur="8s"
repeatCount="indefinite"/>

</circle>


<circle cx="1400"
cy="600"
r="250"
fill="#06b6d4"
opacity="0.2"
filter="url(#glow)"/>





<!-- MANY STARS -->

<g fill="white">


<circle cx="100" cy="100" r="4"/>
<circle cx="220" cy="250" r="3"/>
<circle cx="350" cy="600" r="5"/>
<circle cx="470" cy="150" r="3"/>
<circle cx="600" cy="750" r="4"/>
<circle cx="750" cy="250" r="3"/>
<circle cx="900" cy="120" r="5"/>
<circle cx="1050" cy="700" r="4"/>
<circle cx="1200" cy="200" r="3"/>
<circle cx="1350" cy="120" r="5"/>
<circle cx="1500" cy="400" r="4"/>
<circle cx="1700" cy="700" r="5"/>


<g>

<animate attributeName="opacity"
values="0.2;1;0.2"
dur="2s"
repeatCount="indefinite"/>


<circle cx="180" cy="500" r="5"/>
<circle cx="550" cy="400" r="4"/>
<circle cx="850" cy="650" r="5"/>
<circle cx="1250" cy="500" r="4"/>
<circle cx="1600" cy="220" r="5"/>

</g>


</g>







<!-- EARTH -->

<g>

<circle cx="250"
cy="500"
r="140"
fill="#38bdf8"
opacity="0.25"
filter="url(#glow)"/>


<circle cx="250"
cy="500"
r="100"
fill="url(#earth)"/>


<!-- Continents -->

<path d="
M180 470
c40-40 80-20 100 20
c-50 20-80 50-120 20Z"
fill="#22c55e"/>


<path d="
M270 550
c50-20 80 20 90 50
c-50 20-80 10-90-50Z"
fill="#16a34a"/>


</g>







<!-- MARS -->

<g>

<circle cx="1550"
cy="400"
r="170"
fill="#fb923c"
opacity="0.25"
filter="url(#glow)"/>


<circle cx="1550"
cy="400"
r="120"
fill="url(#mars)"/>


<!-- Mars spots -->

<circle cx="1500"
cy="360"
r="25"
fill="#991b1b"
opacity="0.6"/>

<circle cx="1600"
cy="450"
r="20"
fill="#991b1b"
opacity="0.5"/>

</g>






<!-- PATH -->

<path d="
M350 500
Q900 100 1400 400"
fill="none"
stroke="#ffffff"
stroke-width="3"
opacity="0.25"
stroke-dasharray="15 20"/>







<!-- ROCKET -->

<g>


<animateMotion
dur="8s"
repeatCount="indefinite"
path="
M350 500
Q900 100 1400 400"/>



<!-- Body -->

<ellipse cx="0"
cy="0"
rx="45"
ry="80"
fill="#e5e7eb"
transform="rotate(45)"/>


<!-- Window -->

<circle cx="0"
cy="-25"
r="22"
fill="#38bdf8"/>


<!-- Nose -->

<path d="
M-45 -40
Q0 -120 45 -40"
fill="#ef4444"/>



<!-- Wings -->

<path d="
M-45 20
L-100 70
L-35 50Z"
fill="#f97316"/>


<path d="
M45 20
L100 70
L35 50Z"
fill="#f97316"/>





<!-- FIRE -->

<path d="
M-25 80
Q0 160 25 80"
fill="#facc15">

<animate attributeName="fill"
values="#facc15;#ef4444;#facc15"
dur="0.5s"
repeatCount="indefinite"/>

</path>


</g>







<!-- COMET -->

<g>

<circle cx="1000"
cy="250"
r="12"
fill="#fff">

<animateMotion
dur="5s"
repeatCount="indefinite"
path="M0 0 L500 300"/>

</circle>


<path d="
M1000 250
L850 180"
stroke="white"
stroke-width="6"
opacity="0.7"/>

</g>






<!-- FLOATING PARTICLES -->

<g fill="#f0abfc">

<circle cx="700" cy="500" r="6">

<animate attributeName="cy"
values="500;430;500"
dur="4s"
repeatCount="indefinite"/>

</circle>


<circle cx="1150" cy="300" r="5">

<animate attributeName="cy"
values="300;220;300"
dur="5s"
repeatCount="indefinite"/>

</circle>

</g>




</svg>
</body>
</html>
